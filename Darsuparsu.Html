<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darsu Calculator</title>
 
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
 
<style>
  * { font-family: 'Poppins', sans-serif; box-sizing: border-box; }
 
  :root {
    --bg-a: #7dd3fc;
    --bg-b: #38bdf8;
    --bg-c: #3b82f6;
    --glass: rgba(255,255,255,0.25);
    --glass-border: rgba(255,255,255,0.35);
    --display-bg: rgba(255,255,255,0.4);
    --text-main: #1e293b;
    --text-sub: rgba(30,41,59,0.6);
    --key-bg: rgba(255,255,255,0.4);
    --panel-bg: rgba(255,255,255,0.55);
  }
 
  body.dark {
    --bg-a: #0f172a;
    --bg-b: #1e293b;
    --bg-c: #0b1120;
    --glass: rgba(15,23,42,0.55);
    --glass-border: rgba(148,163,184,0.25);
    --display-bg: rgba(15,23,42,0.6);
    --text-main: #e2e8f0;
    --text-sub: rgba(226,232,240,0.55);
    --key-bg: rgba(148,163,184,0.15);
    --panel-bg: rgba(15,23,42,0.9);
  }
 
  body {
    background: linear-gradient(135deg, var(--bg-a), var(--bg-b), var(--bg-c));
    transition: background 0.5s ease;
  }
 
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .fade-in { animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both; }
 
  @keyframes floatSlow {
    0%, 100% { transform: translate(0, 0); }
    50%      { transform: translate(20px, -25px); }
  }
  @keyframes floatSlow2 {
    0%, 100% { transform: translate(0, 0); }
    50%      { transform: translate(-25px, 20px); }
  }
  .float-a { animation: floatSlow 9s ease-in-out infinite; }
  .float-b { animation: floatSlow2 11s ease-in-out infinite; }
 
  .btn-press {
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    position: relative;
    overflow: hidden;
  }
  .btn-press:hover { transform: scale(1.05); filter: brightness(1.05); }
  .btn-press:active { transform: scale(0.93); }
  .btn-press.key-active {
    transform: scale(0.90);
    filter: brightness(1.15);
  }
 
  .glow-equals { box-shadow: 0 0 22px rgba(6,182,212,0.55), 0 8px 20px rgba(0,0,0,0.15); }
  .glow-equals:hover { box-shadow: 0 0 32px rgba(6,182,212,0.75), 0 10px 24px rgba(0,0,0,0.18); }
 
  /* Ripple effect */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    transform: scale(0);
    animation: rippleAnim 0.6s ease-out;
    pointer-events: none;
  }
  @keyframes rippleAnim {
    to { transform: scale(3); opacity: 0; }
  }
 
  /* Result pulse */
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  .result-pulse { animation: pulse 0.3s ease; }
 
  /* Glass reflection sweep */
  .calc-card { position: relative; overflow: hidden; }
  .calc-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -120%;
    width: 60%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
    transform: skewX(-25deg);
    animation: sweep 6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes sweep {
    0%   { left: -120%; }
    45%  { left: 140%; }
    100% { left: 140%; }
  }
 
  /* History panel slide */
  #historyPanel {
    transform: translateX(110%);
    transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
  }
  #historyPanel.open { transform: translateX(0); }
 
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.5); border-radius: 10px; }
 
  .sci-btn { font-size: 0.95rem; }
 
  .toast {
    animation: fadeInUp 0.3s ease both;
  }
</style>
</head>
 
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">
 
  <!-- Floating background shapes -->
  <div class="absolute w-72 h-72 bg-blue-300 rounded-full blur-3xl opacity-40 top-10 left-10 float-a"></div>
  <div class="absolute w-72 h-72 bg-cyan-300 rounded-full blur-3xl opacity-40 bottom-10 right-10 float-b"></div>
  <div class="absolute w-56 h-56 bg-white rounded-full blur-3xl opacity-30 top-1/2 right-1/4 float-a"></div>
 
  <!-- Calculator -->
  <div class="fade-in calc-card relative w-[400px] max-w-[92vw] backdrop-blur-2xl border rounded-[2rem] shadow-[0_8px_40px_rgba(0,0,0,0.2)] p-6"
       style="background: var(--glass); border-color: var(--glass-border);">
 
    <!-- Header -->
    <div class="flex items-center justify-between mb-4 px-1">
      <div class="flex items-center gap-2">
        <span class="text-2xl">🧮</span>
        <h1 class="text-xl font-bold" style="color: var(--text-main);">Calculator</h1>
